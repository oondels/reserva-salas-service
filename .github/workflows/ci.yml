name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-build-test:
    name: Lint, Build e Testes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reservas_user
          POSTGRES_PASSWORD: reservas_pass
          POSTGRES_DB: reservas
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://reservas_user:reservas_pass@localhost:5432/reservas
      AUTH_SERVICE_URL: http://auth-service/validate
      NOTIFICATION_SERVICE_URL: http://notification-service/send
      PORT: 3000
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      RATE_LIMIT_MAX: 100
      RATE_LIMIT_WINDOW: 60000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build TypeScript
        run: npm run build

      - name: Gerar cliente Prisma
        run: npx prisma generate

      - name: Executar migrations
        run: npx prisma migrate deploy

      - name: Testes unitários com cobertura
        run: npm run test:cov

      - name: Verificar cobertura mínima ≥ 80%
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | node -e "
            const data = require('/dev/stdin');
            const lines = data.total.lines.pct;
            console.log(lines);
          ")
          echo "Cobertura de linhas: $COVERAGE%"
          node -e "if ($COVERAGE < 80) { console.error('Cobertura abaixo de 80%'); process.exit(1); }"
